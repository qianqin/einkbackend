name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, dashboard]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy .env
        run: cp ~/trmnl.env .env

      - name: Pull and restart
        run: |
          docker compose pull
          docker compose up -d --remove-orphans

      - name: Prune superseded images
        if: always()
        run: docker image prune -af --filter "until=24h"
